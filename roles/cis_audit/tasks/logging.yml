      missing_information_placeholders: "{{ cis_logging_missing_information_placeholders }}"
      offline_assumptions:
        - "Audit-only tasks use local command/file/service status checks only; no Internet access is required."
        - "No remediation, restart, reload, or reboot operations are executed."
      os_tested:
        distribution: "{{ ansible_distribution | default('unknown') }}"
        version: "{{ ansible_distribution_version | default('unknown') }}"
        kernel: "{{ ansible_kernel | default('unknown') }}"
      commands: "{{ cis_logging_controls | map(attribute='command') | list | unique }}"
      evidence_records:
        control_checks: "{{ cis_logging_control_evidence.results | default([]) }}"
      result_summary: "{{ cis_logging_result_summary }}"
  vars:
    cis_logging_result_summary: |
      {%- set out = [] -%}
      {%- for c in cis_logging_controls -%}
      {%- set rec = (cis_logging_control_evidence.results | default([]) | selectattr('item.control_id','equalto',c.control_id) | list | first | default({})) -%}
      {%- set rc = rec.rc if (rec.rc is defined) else 999 -%}
      {%- if rc not in [0] -%}
      {%- set status = 'blocked' -%}
      {%- elif c.manual -%}
      {%- set status = 'manual_review_required' -%}
      {%- else -%}
      {%- set status = 'pass' if (rec.stdout | default('') | trim | length) > 0 else 'fail' -%}
      {%- endif -%}
      {%- set _ = out.append({'control_id': c.control_id, 'title': c.title, 'status': status}) -%}
      {%- endfor -%}
      {{ out }}
  changed_when: false
  tags: [cis, audit, alt, logging, chapter_logging]
