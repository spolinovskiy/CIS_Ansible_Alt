        - { control_id: "5.4.2.6", title: "Ensure root user umask is configured", status: "{{ 'manual_review_required' if (cis_rsa_root_umask_patterns | length) == 0 else ('pass' if ((cis_5_4_2_6_root_umask.stdout | default('')) is search((cis_rsa_root_umask_patterns | join('|')))) else 'fail') }}" }
