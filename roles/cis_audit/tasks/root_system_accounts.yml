        - { control_id: "5.4.2.3", title: "Ensure group root is the only GID 0 group", status: "{{ 'manual_review_required' if (cis_rsa_gid0_group_exceptions | length) == 0 else ('pass' if ((cis_5_4_2_3_gid0_groups.stdout_lines | default([]) | difference(['root'] + cis_rsa_gid0_group_exceptions)) | length) == 0 else 'fail') }}" }
