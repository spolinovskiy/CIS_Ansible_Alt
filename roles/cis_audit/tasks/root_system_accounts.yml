        - { control_id: "5.4.2.8", title: "Ensure accounts without a valid login shell are locked", status: "{{ 'manual_review_required' if (cis_rsa_non_login_unlocked_exceptions | length) == 0 else ('pass' if ((cis_5_4_2_8_non_login_not_locked.stdout_lines | default([]) | map('regex_replace', ':.*$', '') | list | difference(cis_rsa_non_login_unlocked_exceptions)) | length) == 0 else 'fail') }}" }
