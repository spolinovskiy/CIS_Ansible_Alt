---
- name: Audit | Root&System Accounts | Define placeholders and defaults
  ansible.builtin.set_fact:
    cis_rsa_system_uid_max: "{{ cis_rsa_system_uid_max | default('MISSING') }}"
    cis_rsa_root_gid0_account_exceptions: "{{ cis_rsa_root_gid0_account_exceptions | default([]) }}"
    cis_rsa_gid0_group_exceptions: "{{ cis_rsa_gid0_group_exceptions | default([]) }}"
    cis_rsa_root_path_exceptions: "{{ cis_rsa_root_path_exceptions | default([]) }}"
    cis_rsa_root_umask_patterns: "{{ cis_rsa_root_umask_patterns | default([]) }}"
    cis_rsa_system_shell_exceptions: "{{ cis_rsa_system_shell_exceptions | default([]) }}"
    cis_rsa_nologin_shell_patterns: "{{ cis_rsa_nologin_shell_patterns | default(['nologin', 'false']) }}"
    cis_rsa_non_login_unlocked_exceptions: "{{ cis_rsa_non_login_unlocked_exceptions | default([]) }}"
    cis_rsa_tmout_max_seconds: "{{ cis_rsa_tmout_max_seconds | default('MISSING') }}"
    cis_rsa_default_umask_patterns: "{{ cis_rsa_default_umask_patterns | default([]) }}"
    cis_rsa_missing_information_placeholders:
      - "MISSING_OT_BASELINE:approved_system_uid_max"
      - "MISSING_OT_BASELINE:approved_root_gid0_account_exceptions"
      - "MISSING_OT_BASELINE:approved_gid0_group_exceptions"
      - "MISSING_OT_BASELINE:approved_root_path_exceptions"
      - "MISSING_OT_BASELINE:approved_root_umask_patterns"
      - "MISSING_OT_BASELINE:approved_system_shell_exceptions"
      - "MISSING_OT_BASELINE:approved_non_login_unlocked_exceptions"
      - "MISSING_OT_BASELINE:approved_tmout_max_seconds"
      - "MISSING_OT_BASELINE:approved_default_umask_patterns"
  changed_when: false
  tags: [cis, audit, alt, root_system_accounts, chapter_root_system_accounts]

- name: Audit | Root&System Accounts | 5.4.2.1 collect UID 0 accounts
  ansible.builtin.command: "awk -F: '($3 == 0) { print $1 }' /etc/passwd"
  register: cis_5_4_2_1_uid0_accounts
  changed_when: false
  failed_when: false
  tags: [cis, cis_5_4_2_1, audit, alt, root_system_accounts, chapter_root_system_accounts]

- name: Audit | Root&System Accounts | 5.4.2.2 collect GID 0 accounts
  ansible.builtin.command: "awk -F: '($4 == 0) { print $1 }' /etc/passwd"
  register: cis_5_4_2_2_gid0_accounts
  changed_when: false
  failed_when: false
  tags: [cis, cis_5_4_2_2, audit, alt, root_system_accounts, chapter_root_system_accounts]

- name: Audit | Root&System Accounts | 5.4.2.3 collect GID 0 groups
  ansible.builtin.command: "awk -F: '($3 == 0) { print $1 }' /etc/group"
  register: cis_5_4_2_3_gid0_groups
  changed_when: false
  failed_when: false
  tags: [cis, cis_5_4_2_3, audit, alt, root_system_accounts, chapter_root_system_accounts]

- name: Audit | Root&System Accounts | 5.4.2.4 collect root passwd status
  ansible.builtin.command: "passwd -S root"
  register: cis_5_4_2_4_root_passwd_status
  changed_when: false
  failed_when: false
  tags: [cis, cis_5_4_2_4, audit, alt, root_system_accounts, chapter_root_system_accounts]

- name: Audit | Root&System Accounts | 5.4.2.5 check root PATH integrity
  ansible.builtin.shell: |
    PATH_VALUE="$(sudo -Hiu root env | awk -F= '/^PATH=/{print $2}')"
    [ -n "$PATH_VALUE" ] || PATH_VALUE="$PATH"
    IFS=':' read -r -a path_parts <<< "$PATH_VALUE"
    if [ "${PATH_VALUE}" != "${PATH_VALUE%:}" ]; then
      echo "TRAILING_COLON"
    fi
    for p in "${path_parts[@]}"; do
      if [ -z "$p" ]; then
        echo "EMPTY_PATH_SEGMENT"
        continue
      fi
      if [ "$p" = "." ]; then
        echo "CURRENT_DIRECTORY_IN_PATH"
      fi
      if [ ! -d "$p" ]; then
        echo "NOT_A_DIRECTORY:$p"
        continue
      fi
      owner="$(stat -c '%U' "$p" 2>/dev/null || true)"
      perms="$(stat -c '%a' "$p" 2>/dev/null || true)"
      if [ "$owner" != "root" ]; then
        echo "NOT_ROOT_OWNED:$p:$owner"
      fi
      if [ -n "$perms" ] && [ "$perms" -gt 755 ]; then
        echo "PERMS_TOO_PERMISSIVE:$p:$perms"
      fi
    done
  register: cis_5_4_2_5_root_path_integrity
  changed_when: false
  failed_when: false
  tags: [cis, cis_5_4_2_5, audit, alt, root_system_accounts, chapter_root_system_accounts]

- name: Audit | Root&System Accounts | 5.4.2.6 collect root umask config
  ansible.builtin.shell: "grep -Psi -- '^\\h*umask\\h+' /root/.bash_profile /root/.bashrc /root/.profile 2>/dev/null"
  register: cis_5_4_2_6_root_umask
  changed_when: false
  failed_when: false
  tags: [cis, cis_5_4_2_6, audit, alt, root_system_accounts, chapter_root_system_accounts]

- name: Audit | Root&System Accounts | 5.4.2.7 collect system accounts with valid shells
  ansible.builtin.shell: |
    uid_min="$(awk '/^\s*UID_MIN\s+/ {print $2; exit}' /etc/login.defs 2>/dev/null)"
    [ -n "$uid_min" ] || uid_min=1000
    awk -F: -v uid_min="$uid_min" '(
      $3 > 0 && $3 < uid_min &&
      $1 !~ /^(root|halt|sync|shutdown|nfsnobody)$/ &&
      $7 !~ /(\/nologin|\/false)$/
    ) {print $1":"$3":"$7}' /etc/passwd
  register: cis_5_4_2_7_system_valid_shells
  changed_when: false
  failed_when: false
  tags: [cis, cis_5_4_2_7, audit, alt, root_system_accounts, chapter_root_system_accounts]

- name: Audit | Root&System Accounts | 5.4.2.8 collect non-login accounts not locked
  ansible.builtin.shell: |
    awk -F: '($1 != "root" && $7 ~ /(\/nologin|\/false)$/) {print $1}' /etc/passwd | while read -r user; do
      [ -n "$user" ] || continue
      pstate="$(awk -F: -v u="$user" '($1==u){print $2; exit}' /etc/shadow 2>/dev/null)"
      case "$pstate" in
        '!'*|'*'|'!!')
          ;;
        *)
          echo "$user:$pstate"
          ;;
      esac
    done
  register: cis_5_4_2_8_non_login_not_locked
  changed_when: false
  failed_when: false
  tags: [cis, cis_5_4_2_8, audit, alt, root_system_accounts, chapter_root_system_accounts]

- name: Audit | Root&System Accounts | 5.4.3.1 check nologin in shells
  ansible.builtin.shell: "grep -Ps '^\\h*([^#\\n\\r]+)?/nologin\\b' /etc/shells"
  register: cis_5_4_3_1_nologin_in_shells
  changed_when: false
  failed_when: false
  tags: [cis, cis_5_4_3_1, audit, alt, root_system_accounts, chapter_root_system_accounts]

- name: Audit | Root&System Accounts | 5.4.3.2 collect TMOUT configuration
  ansible.builtin.shell: |
    grep -RPs -- '^\s*(typeset\s+-xr\s+TMOUT=|readonly\s+TMOUT=|export\s+TMOUT=|TMOUT=)' \
      /etc/profile /etc/profile.d /etc/bashrc /etc/bash.bashrc /etc/zshrc /etc/zprofile 2>/dev/null
  register: cis_5_4_3_2_tmout_config
  changed_when: false
  failed_when: false
  tags: [cis, cis_5_4_3_2, audit, alt, root_system_accounts, chapter_root_system_accounts]

- name: Audit | Root&System Accounts | 5.4.3.3 collect default umask configuration
  ansible.builtin.shell: |
    grep -RPs -- '^\s*umask\s+' /etc/profile /etc/profile.d /etc/bashrc /etc/bash.bashrc /etc/login.defs 2>/dev/null
  register: cis_5_4_3_3_default_umask
  changed_when: false
  failed_when: false
  tags: [cis, cis_5_4_3_3, audit, alt, root_system_accounts, chapter_root_system_accounts]

