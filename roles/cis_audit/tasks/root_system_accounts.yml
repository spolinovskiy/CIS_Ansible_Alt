        - { control_id: "5.4.3.2", title: "Ensure default user shell timeout is configured", status: "{{ 'manual_review_required' if cis_rsa_tmout_max_seconds == 'MISSING' else ('pass' if ((cis_5_4_3_2_tmout_config.stdout | default('')) is search('TMOUT=([1-8]?[0-9]{1,2}|900)\\b') and (cis_5_4_3_2_tmout_config.stdout | default('')) is search('readonly\\s+TMOUT|typeset\\s+-xr\\s+TMOUT') and (cis_5_4_3_2_tmout_config.stdout | default('')) is search('export\\s+TMOUT')) else 'fail') }}" }
