        - "5.4.2.3"
        - "5.4.2.4"
        - "5.4.2.5"
        - "5.4.2.6"
        - "5.4.2.7"
        - "5.4.2.8"
        - "5.4.3.1"
        - "5.4.3.2"
        - "5.4.3.3"
      skipped_controls: []
      manual_controls:
        - "5.4.2.5"
        - "5.4.2.7"
        - "5.4.2.8"
        - "5.4.3.2"
        - "5.4.3.3"
      blocked_controls: []
      high_risk_controls:
        - "5.4.2.1"
        - "5.4.2.2"
        - "5.4.2.3"
        - "5.4.2.4"
        - "5.4.2.5"
        - "5.4.2.6"
        - "5.4.2.7"
        - "5.4.2.8"
        - "5.4.3.1"
        - "5.4.3.2"
        - "5.4.3.3"
      missing_information_placeholders: "{{ cis_rsa_missing_information_placeholders }}"
      offline_assumptions:
        - "Audit-only tasks use local account/profile files and local command output only; no Internet access is required."
        - "No account, password, shell, path, or profile remediation actions are performed."
      os_tested:
        distribution: "{{ ansible_distribution | default('unknown') }}"
        version: "{{ ansible_distribution_version | default('unknown') }}"
        kernel: "{{ ansible_kernel | default('unknown') }}"
      commands:
        - "awk over /etc/passwd, /etc/group, /etc/shadow, /etc/login.defs"
        - "passwd -S root"
        - "grep over /etc/shells, /etc/profile*, /etc/bash* and /root shell init files"
        - "stat checks for root PATH directory ownership and permissions"
      evidence_records:
        "5.4.2.1": { register: "cis_5_4_2_1_uid0_accounts", findings: "{{ cis_5_4_2_1_uid0_accounts.stdout_lines | default([]) }}" }
        "5.4.2.2": { register: "cis_5_4_2_2_gid0_accounts", findings: "{{ cis_5_4_2_2_gid0_accounts.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_root_gid0_account_exceptions"] }
        "5.4.2.3": { register: "cis_5_4_2_3_gid0_groups", findings: "{{ cis_5_4_2_3_gid0_groups.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_gid0_group_exceptions"] }
        "5.4.2.4": { register: "cis_5_4_2_4_root_passwd_status", findings: "{{ cis_5_4_2_4_root_passwd_status.stdout_lines | default([]) }}" }
        "5.4.2.5": { register: "cis_5_4_2_5_root_path_integrity", findings: "{{ cis_5_4_2_5_root_path_integrity.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_root_path_exceptions"] }
        "5.4.2.6": { register: "cis_5_4_2_6_root_umask", findings: "{{ cis_5_4_2_6_root_umask.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_root_umask_patterns"] }
        "5.4.2.7": { register: "cis_5_4_2_7_system_valid_shells", findings: "{{ cis_5_4_2_7_system_valid_shells.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_system_uid_max", "MISSING_OT_BASELINE:approved_system_shell_exceptions"] }
        "5.4.2.8": { register: "cis_5_4_2_8_non_login_not_locked", findings: "{{ cis_5_4_2_8_non_login_not_locked.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_non_login_unlocked_exceptions"] }
        "5.4.3.1": { register: "cis_5_4_3_1_nologin_in_shells", findings: "{{ cis_5_4_3_1_nologin_in_shells.stdout_lines | default([]) }}" }
        "5.4.3.2": { register: "cis_5_4_3_2_tmout_config", findings: "{{ cis_5_4_3_2_tmout_config.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_tmout_max_seconds"] }
        "5.4.3.3": { register: "cis_5_4_3_3_default_umask", findings: "{{ cis_5_4_3_3_default_umask.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_default_umask_patterns"] }
