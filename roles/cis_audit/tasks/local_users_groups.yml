---
- name: Audit | Local Users and Groups | Define placeholders and defaults
  ansible.builtin.set_fact:
    cis_lug_approved_system_account_exceptions: "{{ cis_lug_approved_system_account_exceptions | default([]) }}"
    cis_lug_approved_duplicate_uid_exceptions: "{{ cis_lug_approved_duplicate_uid_exceptions | default([]) }}"
    cis_lug_approved_duplicate_gid_exceptions: "{{ cis_lug_approved_duplicate_gid_exceptions | default([]) }}"
    cis_lug_approved_duplicate_user_exceptions: "{{ cis_lug_approved_duplicate_user_exceptions | default([]) }}"
    cis_lug_approved_duplicate_group_exceptions: "{{ cis_lug_approved_duplicate_group_exceptions | default([]) }}"
    cis_lug_approved_interactive_users: "{{ cis_lug_approved_interactive_users | default([]) }}"
    cis_lug_missing_information_placeholders:
      - "MISSING_OT_BASELINE:approved_system_account_exceptions"
      - "MISSING_OT_BASELINE:approved_duplicate_uid_exceptions"
      - "MISSING_OT_BASELINE:approved_duplicate_gid_exceptions"
      - "MISSING_OT_BASELINE:approved_duplicate_user_exceptions"
      - "MISSING_OT_BASELINE:approved_duplicate_group_exceptions"
      - "MISSING_OT_BASELINE:approved_interactive_users"
  changed_when: false
  tags: [cis, audit, alt, local_users_groups, chapter_local_users_groups]

- name: Audit | Local Users and Groups | Collect passwd lines
  ansible.builtin.command: "awk -F: '{print $1\":\"$2\":\"$3\":\"$4\":\"$6\":\"$7}' /etc/passwd"
  register: cis_lug_passwd_lines
  changed_when: false
  failed_when: false
  tags: [cis, audit, alt, local_users_groups, chapter_local_users_groups]

- name: Audit | Local Users and Groups | Collect shadow lines
  ansible.builtin.command: "awk -F: '{print $1\":\"$2}' /etc/shadow"
  register: cis_lug_shadow_lines
  changed_when: false
  failed_when: false
  tags: [cis, audit, alt, local_users_groups, chapter_local_users_groups]

- name: Audit | Local Users and Groups | Collect group lines
  ansible.builtin.command: "awk -F: '{print $1\":\"$3\":\"$4}' /etc/group"
  register: cis_lug_group_lines
  changed_when: false
  failed_when: false
  tags: [cis, audit, alt, local_users_groups, chapter_local_users_groups]

- name: Audit | Local Users and Groups | 7.2.1 check shadowed passwords
  ansible.builtin.command: "awk -F: '($2 != \"x\") {print $1}' /etc/passwd"
  register: cis_7_2_1_non_shadowed
  changed_when: false
  failed_when: false
  tags: [cis, cis_7_2_1, audit, alt, local_users_groups, chapter_local_users_groups]

- name: Audit | Local Users and Groups | 7.2.2 check empty shadow passwords
  ansible.builtin.command: "awk -F: '($2 == \"\") {print $1}' /etc/shadow"
  register: cis_7_2_2_empty_shadow
  changed_when: false
  failed_when: false
  tags: [cis, cis_7_2_2, audit, alt, local_users_groups, chapter_local_users_groups]

- name: Audit | Local Users and Groups | 7.2.3 check passwd groups exist
  ansible.builtin.shell: "awk -F: '{print $4}' /etc/passwd | while read -r gid; do getent group \"$gid\" >/dev/null || echo \"$gid\"; done"
  register: cis_7_2_3_missing_groups
  changed_when: false
  failed_when: false
  tags: [cis, cis_7_2_3, audit, alt, local_users_groups, chapter_local_users_groups]

- name: Audit | Local Users and Groups | 7.2.4 check shadow group members
  ansible.builtin.shell: "awk -F: '($1==\"shadow\" && $4 != \"\") {print $4}' /etc/group"
  register: cis_7_2_4_shadow_group_members
  changed_when: false
  failed_when: false
  tags: [cis, cis_7_2_4, audit, alt, local_users_groups, chapter_local_users_groups]

- name: Audit | Local Users and Groups | 7.2.5 check duplicate UIDs
  ansible.builtin.shell: "awk -F: '{print $3}' /etc/passwd | sort | uniq -d"
  register: cis_7_2_5_duplicate_uids
  changed_when: false
  failed_when: false
  tags: [cis, cis_7_2_5, audit, alt, local_users_groups, chapter_local_users_groups]

- name: Audit | Local Users and Groups | 7.2.6 check duplicate GIDs
  ansible.builtin.shell: "awk -F: '{print $3}' /etc/group | sort | uniq -d"
  register: cis_7_2_6_duplicate_gids
  changed_when: false
  failed_when: false
  tags: [cis, cis_7_2_6, audit, alt, local_users_groups, chapter_local_users_groups]

- name: Audit | Local Users and Groups | 7.2.7 check duplicate usernames
  ansible.builtin.shell: "awk -F: '{print $1}' /etc/passwd | sort | uniq -d"
  register: cis_7_2_7_duplicate_users
  changed_when: false
  failed_when: false
  tags: [cis, cis_7_2_7, audit, alt, local_users_groups, chapter_local_users_groups]

- name: Audit | Local Users and Groups | 7.2.8 check duplicate group names
  ansible.builtin.shell: "awk -F: '{print $1}' /etc/group | sort | uniq -d"
  register: cis_7_2_8_duplicate_group_names
  changed_when: false
  failed_when: false
  tags: [cis, cis_7_2_8, audit, alt, local_users_groups, chapter_local_users_groups]

- name: Audit | Local Users and Groups | 7.2.9 check interactive home dirs
  ansible.builtin.shell: 'awk -F: ''($7 !~ /(nologin|false)$/) {print $1":"$6":"$7}'' /etc/passwd'
  register: cis_7_2_9_interactive_users
  changed_when: false
  failed_when: false
  tags: [cis, cis_7_2_9, audit, alt, local_users_groups, chapter_local_users_groups]

- name: Audit | Local Users and Groups | 7.2.10 check interactive user dotfiles
  ansible.builtin.shell: "awk -F: '($7 !~ /(nologin|false)$/) {print $6}' /etc/passwd | while read -r h; do [ -d \"$h\" ] && find \"$h\" -maxdepth 1 -type f -name '.*' -perm /022 -print; done"
  register: cis_7_2_10_weak_dotfiles
  changed_when: false
  failed_when: false
  tags: [cis, cis_7_2_10, audit, alt, local_users_groups, chapter_local_users_groups]

- name: Audit | Local Users and Groups | Build chapter summary facts
  ansible.builtin.set_fact:
    cis_local_users_groups_chapter:
      chapter: "Local Users and Groups"
      sheet: "Local Users and Groups"
      implemented_controls:
        - "7.2.1"
        - "7.2.2"
        - "7.2.3"
        - "7.2.4"
        - "7.2.5"
        - "7.2.6"
        - "7.2.7"
        - "7.2.8"
        - "7.2.9"
        - "7.2.10"
      skipped_controls: []
      manual_controls:
        - "7.2.9"
        - "7.2.10"
      blocked_controls: []
      high_risk_controls:
        - "7.2.1"
        - "7.2.2"
        - "7.2.3"
        - "7.2.4"
        - "7.2.5"
        - "7.2.6"
        - "7.2.7"
        - "7.2.8"
        - "7.2.9"
        - "7.2.10"
      missing_information_placeholders: "{{ cis_lug_missing_information_placeholders }}"
      offline_assumptions:
        - "Audit-only tasks use local account database inspection only; no Internet access is required."
        - "No account/group modifications, lockouts, or file permission remediation actions are performed."
      os_tested:
        distribution: "{{ ansible_distribution | default('unknown') }}"
        version: "{{ ansible_distribution_version | default('unknown') }}"
        kernel: "{{ ansible_kernel | default('unknown') }}"
      commands:
        - "awk over /etc/passwd, /etc/shadow, /etc/group"
        - "getent group <gid>"
        - "find <home> -maxdepth 1 -type f -name '.*' -perm /022"
      evidence_records:
        "7.2.1": { register: "cis_7_2_1_non_shadowed", findings: "{{ cis_7_2_1_non_shadowed.stdout_lines | default([]) }}" }
        "7.2.2": { register: "cis_7_2_2_empty_shadow", findings: "{{ cis_7_2_2_empty_shadow.stdout_lines | default([]) }}" }
        "7.2.3": { register: "cis_7_2_3_missing_groups", findings: "{{ cis_7_2_3_missing_groups.stdout_lines | default([]) }}" }
        "7.2.4": { register: "cis_7_2_4_shadow_group_members", findings: "{{ cis_7_2_4_shadow_group_members.stdout_lines | default([]) }}" }
        "7.2.5": { register: "cis_7_2_5_duplicate_uids", findings: "{{ cis_7_2_5_duplicate_uids.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_duplicate_uid_exceptions"] }
        "7.2.6": { register: "cis_7_2_6_duplicate_gids", findings: "{{ cis_7_2_6_duplicate_gids.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_duplicate_gid_exceptions"] }
        "7.2.7": { register: "cis_7_2_7_duplicate_users", findings: "{{ cis_7_2_7_duplicate_users.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_duplicate_user_exceptions"] }
        "7.2.8": { register: "cis_7_2_8_duplicate_group_names", findings: "{{ cis_7_2_8_duplicate_group_names.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_duplicate_group_exceptions"] }
        "7.2.9": { register: "cis_7_2_9_interactive_users", findings: "{{ cis_7_2_9_interactive_users.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_interactive_users"] }
        "7.2.10": { register: "cis_7_2_10_weak_dotfiles", findings: "{{ cis_7_2_10_weak_dotfiles.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_interactive_users"] }
      result_summary:
        - { control_id: "7.2.1", title: "Ensure accounts in /etc/passwd use shadowed passwords", status: "{{ 'pass' if (cis_7_2_1_non_shadowed.stdout_lines | default([]) | length) == 0 else 'fail' }}" }
        - { control_id: "7.2.2", title: "Ensure /etc/shadow password fields are not empty", status: "{{ 'pass' if (cis_7_2_2_empty_shadow.stdout_lines | default([]) | length) == 0 else 'fail' }}" }
        - { control_id: "7.2.3", title: "Ensure all groups in /etc/passwd exist in /etc/group", status: "{{ 'pass' if (cis_7_2_3_missing_groups.stdout_lines | default([]) | length) == 0 else 'fail' }}" }
        - { control_id: "7.2.4", title: "Ensure shadow group is empty", status: "{{ 'pass' if (cis_7_2_4_shadow_group_members.stdout_lines | default([]) | length) == 0 else 'fail' }}" }
        - { control_id: "7.2.5", title: "Ensure no duplicate UIDs exist", status: "{{ 'manual_review_required' if (cis_lug_approved_duplicate_uid_exceptions | length)==0 else ('pass' if (cis_7_2_5_duplicate_uids.stdout_lines | default([]) | difference(cis_lug_approved_duplicate_uid_exceptions) | length)==0 else 'fail') }}" }
        - { control_id: "7.2.6", title: "Ensure no duplicate GIDs exist", status: "{{ 'manual_review_required' if (cis_lug_approved_duplicate_gid_exceptions | length)==0 else ('pass' if (cis_7_2_6_duplicate_gids.stdout_lines | default([]) | difference(cis_lug_approved_duplicate_gid_exceptions) | length)==0 else 'fail') }}" }
        - { control_id: "7.2.7", title: "Ensure no duplicate user names exist", status: "{{ 'manual_review_required' if (cis_lug_approved_duplicate_user_exceptions | length)==0 else ('pass' if (cis_7_2_7_duplicate_users.stdout_lines | default([]) | difference(cis_lug_approved_duplicate_user_exceptions) | length)==0 else 'fail') }}" }
        - { control_id: "7.2.8", title: "Ensure no duplicate group names exist", status: "{{ 'manual_review_required' if (cis_lug_approved_duplicate_group_exceptions | length)==0 else ('pass' if (cis_7_2_8_duplicate_group_names.stdout_lines | default([]) | difference(cis_lug_approved_duplicate_group_exceptions) | length)==0 else 'fail') }}" }
        - { control_id: "7.2.9", title: "Ensure local interactive user home directories are configured", status: "manual_review_required" }
        - { control_id: "7.2.10", title: "Ensure local interactive user dot files access is configured", status: "manual_review_required" }
  changed_when: false
  tags: [cis, audit, alt, local_users_groups, chapter_local_users_groups]
