---
- name: Audit | Passwords | Define placeholders and defaults
  ansible.builtin.set_fact:
    cis_pw_max_days_threshold: "{{ cis_pw_max_days_threshold | default(365) }}"
    cis_pw_min_days_threshold: "{{ cis_pw_min_days_threshold | default('MISSING') }}"
    cis_pw_warn_age_threshold: "{{ cis_pw_warn_age_threshold | default(7) }}"
    cis_pw_hashing_allowed_algorithms: "{{ cis_pw_hashing_allowed_algorithms | default([]) }}"
    cis_pw_inactive_lock_threshold: "{{ cis_pw_inactive_lock_threshold | default(30) }}"
    cis_pw_last_change_exception_users: "{{ cis_pw_last_change_exception_users | default([]) }}"
    cis_pw_missing_information_placeholders:
      - "MISSING_OT_BASELINE:approved_min_password_days_threshold"
      - "MISSING_OT_BASELINE:approved_password_hashing_algorithms"
      - "MISSING_OT_BASELINE:approved_inactive_lock_threshold"
      - "MISSING_OT_BASELINE:approved_last_password_change_exceptions"
  changed_when: false
  tags: [cis, audit, alt, passwords, chapter_passwords]

- name: Audit | Passwords | Read login.defs for PASS_MAX_DAYS
  ansible.builtin.shell: "awk '/^\\s*PASS_MAX_DAYS\\s+/ {print $2}' /etc/login.defs"
  register: cis_5_4_1_1_pass_max_days
  failed_when: false
  changed_when: false
  tags: [cis, cis_5_4_1_1, audit, alt, passwords, chapter_passwords]

- name: Audit | Passwords | Read login.defs for PASS_MIN_DAYS
  ansible.builtin.shell: "awk '/^\\s*PASS_MIN_DAYS\\s+/ {print $2}' /etc/login.defs"
  register: cis_5_4_1_2_pass_min_days
  failed_when: false
  changed_when: false
  tags: [cis, cis_5_4_1_2, audit, alt, passwords, chapter_passwords]

- name: Audit | Passwords | Read login.defs for PASS_WARN_AGE
  ansible.builtin.shell: "awk '/^\\s*PASS_WARN_AGE\\s+/ {print $2}' /etc/login.defs"
  register: cis_5_4_1_3_pass_warn_age
  failed_when: false
  changed_when: false
  tags: [cis, cis_5_4_1_3, audit, alt, passwords, chapter_passwords]

- name: Audit | Passwords | Read hashing algorithm configuration
  ansible.builtin.shell: "grep -RPs -- '^(ENCRYPT_METHOD|password\\s+.*pam_unix\\.so.*(sha512|yescrypt))' /etc/login.defs /etc/pam.d 2>/dev/null"
  register: cis_5_4_1_4_hashing_algo
  failed_when: false
  changed_when: false
  tags: [cis, cis_5_4_1_4, audit, alt, passwords, chapter_passwords]

- name: Audit | Passwords | Read INACTIVE value from useradd defaults
  ansible.builtin.shell: "awk -F= '/^INACTIVE=/{print $2}' /etc/default/useradd"
  register: cis_5_4_1_5_inactive_days
  failed_when: false
  changed_when: false
  tags: [cis, cis_5_4_1_5, audit, alt, passwords, chapter_passwords]

- name: Audit | Passwords | Find users with future last password change date
  ansible.builtin.shell: 'awk -F: ''($3 ~ /^[0-9]+$/ && $3 > int(systime()/86400)) {print $1":"$3}'' /etc/shadow'
  register: cis_5_4_1_6_future_last_change
  failed_when: false
  changed_when: false
  tags: [cis, cis_5_4_1_6, audit, alt, passwords, chapter_passwords]

- name: Audit | Passwords | Build chapter summary facts
  ansible.builtin.set_fact:
    cis_passwords_chapter:
      chapter: "Passwords"
      sheet: "Passwords"
      implemented_controls:
        - "5.4.1.1"
        - "5.4.1.2"
        - "5.4.1.3"
        - "5.4.1.4"
        - "5.4.1.5"
        - "5.4.1.6"
      skipped_controls: []
      manual_controls:
        - "5.4.1.2"
      blocked_controls: []
      high_risk_controls:
        - "5.4.1.1"
        - "5.4.1.2"
        - "5.4.1.3"
        - "5.4.1.4"
        - "5.4.1.5"
        - "5.4.1.6"
      missing_information_placeholders: "{{ cis_pw_missing_information_placeholders }}"
      offline_assumptions:
        - "Audit-only tasks use local login/shadow/PAM file checks only; no Internet access is required."
        - "No password policy remediation, account locking, or auth stack changes are performed."
      os_tested:
        distribution: "{{ ansible_distribution | default('unknown') }}"
        version: "{{ ansible_distribution_version | default('unknown') }}"
        kernel: "{{ ansible_kernel | default('unknown') }}"
      commands:
        - "awk PASS_MAX_DAYS/PASS_MIN_DAYS/PASS_WARN_AGE from /etc/login.defs"
        - "grep hashing algorithm hints in /etc/login.defs and /etc/pam.d"
        - "awk INACTIVE from /etc/default/useradd"
        - "awk future last password change values from /etc/shadow"
      evidence_records:
        "5.4.1.1": { register: "cis_5_4_1_1_pass_max_days", value: "{{ cis_5_4_1_1_pass_max_days.stdout_lines | default([]) }}", baseline_threshold: "{{ cis_pw_max_days_threshold }}" }
        "5.4.1.2": { register: "cis_5_4_1_2_pass_min_days", value: "{{ cis_5_4_1_2_pass_min_days.stdout_lines | default([]) }}", baseline_threshold: "{{ cis_pw_min_days_threshold }}", placeholders: ["MISSING_OT_BASELINE:approved_min_password_days_threshold"] }
        "5.4.1.3": { register: "cis_5_4_1_3_pass_warn_age", value: "{{ cis_5_4_1_3_pass_warn_age.stdout_lines | default([]) }}", baseline_threshold: "{{ cis_pw_warn_age_threshold }}" }
        "5.4.1.4": { register: "cis_5_4_1_4_hashing_algo", value: "{{ cis_5_4_1_4_hashing_algo.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_password_hashing_algorithms"] }
        "5.4.1.5": { register: "cis_5_4_1_5_inactive_days", value: "{{ cis_5_4_1_5_inactive_days.stdout_lines | default([]) }}", baseline_threshold: "{{ cis_pw_inactive_lock_threshold }}", placeholders: ["MISSING_OT_BASELINE:approved_inactive_lock_threshold"] }
        "5.4.1.6": { register: "cis_5_4_1_6_future_last_change", value: "{{ cis_5_4_1_6_future_last_change.stdout_lines | default([]) }}", placeholders: ["MISSING_OT_BASELINE:approved_last_password_change_exceptions"] }
      result_summary:
        -
          control_id: "5.4.1.1"
          title: "Ensure password expiration is configured"
          status: "{{ 'pass' if ((cis_5_4_1_1_pass_max_days.stdout | default('') | trim | int(-1)) > 0 and (cis_5_4_1_1_pass_max_days.stdout | default('') | trim | int(9999)) <= (cis_pw_max_days_threshold | int)) else 'fail' }}"
        -
          control_id: "5.4.1.2"
          title: "Ensure minimum password days is configured (Manual)"
          status: "{{ 'manual_review_required' if cis_pw_min_days_threshold == 'MISSING' else ('pass' if (cis_5_4_1_2_pass_min_days.stdout | default('') | trim | int(-1)) >= (cis_pw_min_days_threshold | int) else 'fail') }}"
        -
          control_id: "5.4.1.3"
          title: "Ensure password expiration warning days is configured"
          status: "{{ 'pass' if ((cis_5_4_1_3_pass_warn_age.stdout | default('') | trim | int(-1)) >= (cis_pw_warn_age_threshold | int)) else 'fail' }}"
        -
          control_id: "5.4.1.4"
          title: "Ensure strong password hashing algorithm is configured"
          status: "{{ 'manual_review_required' if (cis_pw_hashing_allowed_algorithms | length) == 0 else ('pass' if ((cis_5_4_1_4_hashing_algo.stdout | default('')) | lower is search((cis_pw_hashing_allowed_algorithms | join('|') | lower))) else 'fail') }}"
        -
          control_id: "5.4.1.5"
          title: "Ensure inactive password lock is configured"
          status: "{{ 'manual_review_required' if cis_pw_inactive_lock_threshold is none else ('pass' if ((cis_5_4_1_5_inactive_days.stdout | default('') | trim | int(9999)) <= (cis_pw_inactive_lock_threshold | int)) else 'fail') }}"
        -
          control_id: "5.4.1.6"
          title: "Ensure all users last password change date is in the past"
          status: "{{ 'manual_review_required' if (cis_pw_last_change_exception_users | length) == 0 else ('pass' if ((cis_5_4_1_6_future_last_change.stdout_lines | default([]) | map('regex_replace', ':.*$', '') | list | difference(cis_pw_last_change_exception_users)) | length) == 0 else 'fail') }}"
  changed_when: false
  tags: [cis, audit, alt, passwords, chapter_passwords]
